<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitaliza Urpín | Catálogo Inteligente</title>
    
    <!-- Librerías de Estilo y Animación -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración de Firebase verificada desde tus capturas
        const firebaseConfig = {
            apiKey: "AIzaSyAstAXcgNXevSuTbgZYQ_U9_SwhUI4tzTY",
            authDomain: "digitaliza-urpin.firebaseapp.com",
            projectId: "digitaliza-urpin",
            storageBucket: "digitaliza-urpin.firebasestorage.app",
            messagingSenderId: "634374370608",
            appId: "1:634374370608:web:91861bb040c110d560c4f5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // CONFIGURACIÓN DE IDENTIDAD
        const params = new URLSearchParams(window.location.search);
        // Ajustamos el default a 'estermendoza' porque es el que vimos que existe en tu Firestore
        const CLIENTE_ID = params.get('id') || "estermendoza"; 
        const APP_ID = "digitaliza-urpin-2026"; 
        
        // Variables de Estado
        let TASA_BCV = 49.50; 
        let carrito = [];
        let productosData = [];
        let categoriaActual = "Todas";
        let busquedaActual = "";
        let configNegocio = {};

        // Diccionario de Temas según tipo de negocio
        const temas = {
            food: { primary: 'orange-500', bg: 'slate-900', label: 'Pedido', icon: 'fa-utensils' },
            parts: { primary: 'blue-600', bg: 'slate-900', label: 'Cotización', icon: 'fa-cogs' },
            bakery: { primary: 'pink-500', bg: 'stone-900', label: 'Encargo', icon: 'fa-birthday-cake' },
            store: { primary: 'emerald-600', bg: 'zinc-900', label: 'Compra', icon: 'fa-shopping-bag' }
        };

        // Función para obtener la tasa del dólar en tiempo real
        async function actualizarTasa() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                if (data?.rates?.VES) {
                    TASA_BCV = data.rates.VES;
                    const el = document.getElementById('bcv-rate');
                    if (el) el.innerText = `TASA BCV: ${TASA_BCV.toFixed(2)} BS.`;
                    renderInterface(); 
                }
            } catch (e) { console.warn("Usando tasa por defecto"); }
        }

        /**
         * CORRECCIÓN DE RUTA (Basado en tu captura de Firestore):
         * artifacts (col) -> digitaliza-urpin-2026 (doc) -> public (col) -> data (doc) -> clientes (col) -> estermendoza (doc)
         */
        const docRef = doc(db, "artifacts", APP_ID, "public", "data", "clientes", CLIENTE_ID);

        // Escucha en tiempo real de Firestore
        onSnapshot(docRef, (snap) => {
            const loader = document.getElementById('loader-global');
            if (snap.exists()) {
                const data = snap.data();
                productosData = data.products || [];
                configNegocio = data.business || { name: "Digitaliza", accent: "Urpín", type: "food" };
                
                if (loader) {
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }
                renderInterface();
            } else {
                console.error("Ruta no encontrada:", docRef.path);
                document.getElementById('shop-name').innerHTML = `<span class="text-red-500 text-xs">ID NO REGISTRADO</span>`;
                document.getElementById('product-list').innerHTML = `
                    <div class="py-20 text-center text-slate-400 font-bold uppercase text-[10px] tracking-widest animate__animated animate__fadeIn">
                        <i class="fas fa-search-minus text-4xl mb-4 block opacity-20"></i>
                        El cliente "${CLIENTE_ID}" no existe<br>en la base de datos de 2026.
                    </div>`;
                if (loader) loader.style.display = 'none';
            }
        });

        function renderInterface() {
            const tema = temas[configNegocio.type] || temas.food;
            
            // Actualizar colores y textos de la interfaz
            const header = document.getElementById('main-header');
            if (header) header.className = `p-8 pt-12 rounded-b-[3.5rem] text-white shadow-2xl transition-all duration-500 bg-${tema.bg}`;
            
            document.getElementById('shop-name').innerHTML = `${configNegocio.name} <span class="text-${tema.primary}">${configNegocio.accent}</span>`;
            document.getElementById('cart-icon').className = `fas ${tema.icon} text-${tema.primary} text-xl`;
            document.getElementById('btn-send-text').innerText = `Enviar ${tema.label} vía WhatsApp`;

            renderCategorias(tema);
            renderProductos(tema);
        }

        function renderCategorias(tema) {
            const container = document.getElementById('category-filters');
            const cats = ["Todas", ...new Set(productosData.map(p => p.category))];
            container.innerHTML = cats.map(c => `
                <button onclick="window.filtrar('${c}')" 
                    class="px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all whitespace-nowrap
                    ${categoriaActual === c ? `bg-${tema.primary} text-white shadow-lg scale-105` : 'bg-white text-slate-400 border border-slate-100'}">
                    ${c}
                </button>
            `).join('');
        }

        function renderProductos(tema) {
            const container = document.getElementById('product-list');
            const filtrados = productosData.filter(p => 
                (categoriaActual === "Todas" || p.category === categoriaActual) && 
                p.name.toLowerCase().includes(busquedaActual.toLowerCase())
            );

            if (filtrados.length === 0) {
                container.innerHTML = `<div class="py-20 text-center text-slate-300 text-[10px] font-bold uppercase">Sin resultados</div>`;
                return;
            }

            container.innerHTML = filtrados.map(p => `
                <div class="bg-white p-4 rounded-[2.5rem] shadow-sm border border-slate-100 flex items-center mb-5 animate__animated animate__fadeInUp">
                    <img src="${p.img || ''}" class="w-24 h-24 rounded-[2rem] object-cover bg-slate-50" onerror="this.src='https://placehold.co/200x200/f8fafc/64748b?text=${p.name[0]}'">
                    <div class="ml-5 flex-1">
                        <h3 class="text-[12px] font-black text-slate-800 uppercase tracking-tight">${p.name}</h3>
                        <p class="text-[8px] text-slate-400 font-bold uppercase mb-2">${p.category}</p>
                        <div class="flex justify-between items-end">
                            <div>
                                <span class="text-xl font-black text-slate-900">$${Number(p.price).toFixed(2)}</span>
                                <span class="block text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${(p.price * TASA_BCV).toFixed(2)} Bs.</span>
                            </div>
                            <button onclick="window.agregar('${p.id}')" class="bg-${tema.primary} text-white w-12 h-12 rounded-[1.2rem] flex items-center justify-center shadow-lg active:scale-90 transition-all">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Globales para botones de HTML
        window.filtrar = (c) => { categoriaActual = c; renderInterface(); };
        window.buscar = (t) => { busquedaActual = t; renderInterface(); };
        window.toggleCart = () => document.getElementById('cart-view').classList.toggle('translate-y-full');
        
        window.agregar = (id) => {
            const p = productosData.find(x => String(x.id) === String(id));
            if (!p) return;
            const item = carrito.find(x => String(x.id) === String(id));
            if (item) item.qty++; else carrito.push({...p, qty: 1});
            window.actualizarCarrito();
            window.notificar(`Añadido: ${p.name}`);
        };

        window.actualizarCarrito = () => {
            const count = carrito.reduce((s, i) => s + i.qty, 0);
            const badge = document.getElementById('cart-count');
            badge.innerText = count;
            badge.classList.toggle('hidden', count === 0);
            
            let total = 0;
            const container = document.getElementById('cart-items');
            if (carrito.length === 0) {
                container.innerHTML = `<div class="py-12 text-center text-slate-300 text-[10px] font-bold uppercase">Carrito Vacío</div>`;
            } else {
                container.innerHTML = carrito.map(i => {
                    total += (i.price * i.qty);
                    return `
                    <div class="flex justify-between py-4 border-b border-slate-50 items-center">
                        <div class="pr-4">
                            <h4 class="text-[11px] font-black uppercase text-slate-800 leading-tight">${i.name}</h4>
                            <p class="text-[10px] text-slate-400 font-bold">${i.qty} x $${i.price.toFixed(2)}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="window.modificar('${i.id}', -1)" class="w-8 h-8 bg-slate-100 rounded-xl text-slate-500 font-bold">-</button>
                            <button onclick="window.modificar('${i.id}', 1)" class="w-8 h-8 bg-slate-100 rounded-xl text-slate-500 font-bold">+</button>
                        </div>
                    </div>`;
                }).join('');
            }
            document.getElementById('total-usd').innerText = total.toFixed(2);
            document.getElementById('total-bs').innerText = (total * TASA_BCV).toLocaleString('es-VE', {minimumFractionDigits: 2});
        };

        window.modificar = (id, d) => {
            const idx = carrito.findIndex(i => String(i.id) === String(id));
            if (idx !== -1) {
                carrito[idx].qty += d;
                if (carrito[idx].qty <= 0) carrito.splice(idx, 1);
                window.actualizarCarrito();
            }
        };

        window.notificar = (m) => {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.remove('hidden');
            setTimeout(() => t.classList.add('hidden'), 2000);
        };

        window.enviarWhatsApp = () => {
            if (carrito.length === 0) return;
            const tel = (configNegocio.whatsapp || '584120000000').replace(/\D/g, '');
            let msg = `*NUEVO PEDIDO - ${configNegocio.name}*\n\n`;
            carrito.forEach(i => msg += `✅ *${i.qty}x* ${i.name} ($${(i.price*i.qty).toFixed(2)})\n`);
            msg += `\n*TOTAL: $${document.getElementById('total-usd').innerText}*\n`;
            msg += `*EQUIVALENTE: ${document.getElementById('total-bs').innerText} BS.*`;
            window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
        };

        actualizarTasa();
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input:focus::placeholder { opacity: 0; }
    </style>
</head>
<body class="max-w-md mx-auto bg-slate-50 min-h-screen relative overflow-x-hidden">

    <!-- Loader -->
    <div id="loader-global" class="fixed inset-0 bg-white z-[1000] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-slate-100 border-t-blue-600 rounded-full animate-spin"></div>
        <p class="text-[10px] font-black uppercase mt-8 text-slate-300 tracking-[0.3em] animate-pulse">Sincronizando Sistema</p>
    </div>

    <!-- Header -->
    <header id="main-header" class="p-8 pt-12 text-white shadow-2xl transition-all duration-500 bg-slate-900">
        <div class="flex justify-between items-start">
            <div>
                <h1 id="shop-name" class="text-3xl font-black italic tracking-tighter uppercase leading-none">Cargando...</h1>
                <p id="bcv-rate" class="text-[9px] font-bold text-white/40 tracking-widest mt-2 uppercase">Actualizando Tasa...</p>
            </div>
            <button onclick="toggleCart()" class="relative active:scale-95 transition-transform">
                <div class="w-14 h-14 bg-white/10 backdrop-blur-md rounded-[1.5rem] flex items-center justify-center border border-white/20 shadow-xl">
                    <i id="cart-icon" class="fas fa-shopping-basket text-xl"></i>
                </div>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-6 h-6 rounded-full flex items-center justify-center font-black hidden border-2 border-slate-900 shadow-lg">0</span>
            </button>
        </div>
        <div class="mt-10 relative">
            <input type="text" onkeyup="buscar(this.value)" placeholder="Buscar producto..." class="w-full bg-white/10 backdrop-blur-md border border-white/10 rounded-[1.5rem] py-5 pl-12 text-xs text-white outline-none focus:bg-white/20 transition-all font-bold uppercase placeholder:text-white/30">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-white/20 text-sm"></i>
        </div>
    </header>

    <!-- Filtros -->
    <div id="category-filters" class="flex space-x-3 overflow-x-auto no-scrollbar px-8 py-6"></div>

    <!-- Lista de Productos -->
    <main id="product-list" class="px-8 pb-32"></main>

    <!-- Modal de Carrito -->
    <div id="cart-view" class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm translate-y-full transition-transform duration-500 flex items-end">
        <div class="w-full bg-white rounded-t-[3.5rem] p-10 shadow-2xl relative max-w-md mx-auto">
            <div class="w-12 h-1 bg-slate-100 rounded-full absolute top-4 left-1/2 -translate-x-1/2"></div>
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black text-2xl uppercase italic tracking-tighter">Tu Compra</h2>
                <button onclick="toggleCart()" class="text-slate-200 hover:text-slate-400"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="cart-items" class="max-h-[40vh] overflow-y-auto no-scrollbar mb-8"></div>
            <div class="bg-slate-50 rounded-[2.5rem] p-6 mb-8 flex justify-between items-end border border-slate-100">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">Total a Pagar</p>
                    <h3 class="text-4xl font-black text-slate-900">$<span id="total-usd">0.00</span></h3>
                </div>
                <p class="text-lg font-black text-blue-600 italic"><span id="total-bs">0,00</span> Bs.</p>
            </div>
            <button onclick="enviarWhatsApp()" class="w-full bg-green-500 text-white py-6 rounded-[2rem] font-black uppercase text-[11px] tracking-widest shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                <i class="fab fa-whatsapp text-2xl"></i>
                <span id="btn-send-text">Finalizar Pedido</span>
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[101] bg-slate-900 text-white px-6 py-4 rounded-2xl text-[9px] font-black uppercase tracking-widest hidden animate__animated animate__fadeInUp"></div>

</body>
</html>
