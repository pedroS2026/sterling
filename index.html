<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitaliza Urpín | Sistema Universal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAstAXcgNXevSuTbgZYQ_U9_SwhUI4tzTY",
            authDomain: "digitaliza-urpin.firebaseapp.com",
            projectId: "digitaliza-urpin",
            storageBucket: "digitaliza-urpin.firebasestorage.app",
            messagingSenderId: "634374370608",
            appId: "1:634374370608:web:91861bb040c110d560c4f5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const CLIENTE_ID = params.get('id') || "demo"; 
        
        let TASA_BCV = 49.50; 
        let carrito = [];
        let productosData = [];
        let categoriaActual = "Todas";
        let busquedaActual = "";
        let configNegocio = {};

        const DEFAULT_DATA = {
            business: { name: "Digitaliza", accent: "Urpín", type: "parts", whatsapp: "584266662491" },
            products: [
                { id: 1, name: "Alternador Universal", price: 85.00, category: "Eléctrico", img: "https://images.unsplash.com/photo-1635773054018-208260655383?w=500" },
                { id: 2, name: "Pastillas de Freno", price: 25.00, category: "Frenos", img: "https://images.unsplash.com/photo-1486006396193-471d6f58c6ca?w=500" }
            ]
        };

        const temas = {
            food: { primary: 'orange-500', bg: 'slate-900', label: 'Pedido', icon: 'fa-shopping-cart' },
            parts: { primary: 'blue-500', bg: 'slate-900', label: 'Cotización', icon: 'fa-cog' },
            bakery: { primary: 'amber-600', bg: 'stone-800', label: 'Encargo', icon: 'fa-bread-slice' },
            store: { primary: 'emerald-600', bg: 'zinc-900', label: 'Compra', icon: 'fa-shopping-bag' }
        };

        async function actualizarTasa() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                if (data?.rates?.VES) {
                    TASA_BCV = data.rates.VES;
                    const bcvEl = document.getElementById('bcv-rate');
                    if (bcvEl) bcvEl.innerText = `BCV: ${TASA_BCV.toFixed(2)} Bs.`;
                }
            } catch (e) { console.log("Tasa manual activa"); }
        }

        onSnapshot(doc(db, "clientes", CLIENTE_ID), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                productosData = data.products || [];
                configNegocio = data.business || {};
            } else {
                productosData = DEFAULT_DATA.products;
                configNegocio = DEFAULT_DATA.business;
            }
            renderInterface();
        }, (error) => {
            productosData = DEFAULT_DATA.products;
            configNegocio = DEFAULT_DATA.business;
            renderInterface();
        });

        function renderInterface() {
            const tipo = configNegocio.type || 'food';
            const tema = temas[tipo] || temas.food;
            
            document.getElementById('main-header').className = `p-6 pt-10 rounded-b-[2.5rem] shadow-2xl text-white relative transition-all bg-${tema.bg}`;
            document.getElementById('shop-name').innerHTML = `${configNegocio.name} <span class="text-${tema.primary}">${configNegocio.accent}</span>`;
            document.getElementById('cart-icon').className = `fas ${tema.icon} text-${tema.primary}`;
            
            document.getElementById('modal-title').innerText = `Tu ${tema.label}`;
            document.getElementById('btn-send-text').innerText = `Enviar ${tema.label}`;

            renderCategorias(tema);
            renderProductos(tema);
            actualizarTasa();
        }

        function renderCategorias(tema) {
            const cats = ["Todas", ...new Set(productosData.map(p => p.category))];
            const container = document.getElementById('category-filters');
            container.innerHTML = cats.map(cat => `
                <button onclick="filtrar('${cat}')" class="px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider transition-all whitespace-nowrap ${categoriaActual === cat ? `bg-${tema.primary} text-white shadow-lg` : 'bg-white text-slate-400 border border-slate-100'}">
                    ${cat}
                </button>
            `).join('');
        }

        function renderProductos(tema) {
            const container = document.getElementById('product-list');
            const filtrados = productosData.filter(p => {
                const matchCat = categoriaActual === "Todas" || p.category === categoriaActual;
                const matchSearch = p.name.toLowerCase().includes(busquedaActual);
                return matchCat && matchSearch;
            });

            container.innerHTML = filtrados.map(p => `
                <div class="bg-white p-3 rounded-[1.8rem] shadow-sm border border-slate-100 flex items-center mb-4 active:scale-95 transition-all">
                    <img src="${p.img}" class="w-20 h-20 rounded-2xl object-cover" onerror="this.src='https://placehold.co/200x200?text=${p.name}'">
                    <div class="ml-4 flex-1">
                        <h3 class="text-[11px] font-black text-slate-800 uppercase tracking-tight">${p.name}</h3>
                        <div class="flex justify-between items-end mt-2">
                            <div>
                                <span class="text-lg font-black text-slate-900">$${p.price.toFixed(2)}</span>
                                <span class="block text-[9px] font-bold text-slate-400 uppercase leading-none">${(p.price * TASA_BCV).toFixed(2)} Bs.</span>
                            </div>
                            <button onclick="add(${p.id})" class="bg-${tema.primary} text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-md">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.add = (id) => {
            const p = productosData.find(x => x.id === id);
            const item = carrito.find(x => x.id === id);
            if (item) item.qty++; else carrito.push({...p, qty: 1});
            updateCart();
        };

        window.removeItem = (id) => {
            carrito = carrito.filter(x => x.id !== id);
            updateCart();
            if(carrito.length === 0) setTimeout(toggleCart, 300);
        };

        window.limpiarCarrito = () => {
            carrito = [];
            updateCart();
            toggleCart();
        };

        window.updateCart = () => {
            const count = carrito.reduce((a, b) => a + b.qty, 0);
            const badge = document.getElementById('cart-count');
            badge.innerText = count;
            badge.classList.toggle('hidden', count === 0);
            
            let total = 0;
            const container = document.getElementById('cart-items');
            
            if (carrito.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 text-slate-300">
                        <i class="fas fa-shopping-basket text-5xl mb-4"></i>
                        <p class="font-black uppercase text-[10px] tracking-widest">El carrito está vacío</p>
                    </div>
                `;
            } else {
                container.innerHTML = carrito.map(item => {
                    total += item.price * item.qty;
                    return `
                        <div class="flex justify-between items-center py-4 border-b border-slate-50 animate-slide-up">
                            <div class="flex-1">
                                <p class="text-[10px] font-black text-slate-800 uppercase">${item.name}</p>
                                <p class="text-[9px] font-bold text-slate-400">$${item.price.toFixed(2)} x ${item.qty}</p>
                            </div>
                            <div class="flex items-center space-x-4">
                                <span class="text-xs font-black text-slate-900">$${(item.price * item.qty).toFixed(2)}</span>
                                <button onclick="removeItem(${item.id})" class="text-red-200 hover:text-red-500 transition-colors p-2">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            document.getElementById('total-usd').innerText = total.toFixed(2);
            document.getElementById('total-bs').innerText = (total * TASA_BCV).toLocaleString('es-VE', { minimumFractionDigits: 2 });
            document.getElementById('btn-clear-all').classList.toggle('hidden', carrito.length === 0);
        };

        window.filtrar = (cat) => { categoriaActual = cat; renderInterface(); };
        window.buscar = (t) => { busquedaActual = t.toLowerCase(); renderInterface(); };
        window.toggleCart = () => document.getElementById('cart-view').classList.toggle('translate-y-full');

        // --- LÓGICA DE WHATSAPP CON INTENT PARA ANDROID ---
        window.enviarWhatsApp = () => {
            if (carrito.length === 0) return;
            
            const extra = document.getElementById('extra-info').value;
            const tipo = configNegocio.type || 'food';
            const label = temas[tipo]?.label || 'Pedido';
            const totalUSD = document.getElementById('total-usd').innerText;
            const totalBS = document.getElementById('total-bs').innerText;
            
            let texto = `*NUEVA ${label.toUpperCase()}*\n`;
            texto += `----------------------------\n`;
            
            carrito.forEach(item => {
                texto += `✅ *${item.qty}x* ${item.name.toUpperCase()}\n`;
                texto += `   Sub: $${(item.price * item.qty).toFixed(2)}\n`;
            });
            
            texto += `----------------------------\n`;
            texto += `*TOTAL:* $${totalUSD}\n`;
            texto += `*BS:* ${totalBS} Bs.\n`;
            
            if (extra) {
                texto += `\n*CLIENTE/REF:* ${extra}\n`;
            }
            
            texto += `\n_Enviado desde Digitaliza Urpín_`;

            const phone = (configNegocio.whatsapp || '584266662491').replace(/\D/g, '');
            const encodedText = encodeURIComponent(texto);
            
            // Detectar el dispositivo para forzar la apertura correcta
            const isAndroid = /Android/i.test(navigator.userAgent);
            const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
            
            let url = "";
            
            if (isAndroid) {
                // El Intent específico de Android que ignora a Chrome y va directo a WhatsApp
                url = `intent://send?phone=${phone}&text=${encodedText}#Intent;scheme=whatsapp;package=com.whatsapp;end`;
            } else if (isIOS) {
                // En iPhone, el protocolo whatsapp:// es el estándar directo
                url = `whatsapp://send?phone=${phone}&text=${encodedText}`;
            } else {
                // Para tu ThinkPad X61 u otras PCs (Abre WhatsApp Web)
                url = `https://web.whatsapp.com/send?phone=${phone}&text=${encodedText}`;
            }
            
            window.location.href = url;
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="max-w-md mx-auto bg-slate-50 min-h-screen relative overflow-x-hidden">

    <!-- Header -->
    <header id="main-header" class="bg-slate-900 p-6 pt-10 rounded-b-[2.5rem] text-white">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 id="shop-name" class="text-2xl font-black italic tracking-tighter uppercase leading-none">
                    Cargando...
                </h1>
                <p id="bcv-rate" class="text-[9px] font-bold text-slate-500 tracking-[0.2em] mt-2 uppercase">BCV: --</p>
            </div>
            <button onclick="toggleCart()" class="relative w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center border border-white/10 active:scale-90 transition-all">
                <i id="cart-icon" class="fas fa-shopping-cart text-xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-black hidden shadow-lg">0</span>
            </button>
        </div>
        
        <div class="relative">
            <i class="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
            <input type="text" onkeyup="buscar(this.value)" placeholder="¿Qué necesitas?" class="w-full bg-white/5 border border-white/10 rounded-[1.2rem] py-4 pl-12 pr-4 text-xs text-white focus:bg-white/10 outline-none transition-all">
        </div>
    </header>

    <!-- Filtros -->
    <div id="category-filters" class="flex space-x-3 overflow-x-auto no-scrollbar px-6 py-6"></div>

    <!-- Lista -->
    <main id="product-list" class="px-6 pb-32"></main>

    <!-- Carrito View -->
    <div id="cart-view" class="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm translate-y-full transition-transform duration-500 flex items-end">
        <div class="w-full max-w-md mx-auto bg-white rounded-t-[3rem] flex flex-col max-h-[92vh] shadow-2xl">
            
            <div class="p-8 pb-4 flex justify-between items-center">
                <div class="flex flex-col">
                    <h2 id="modal-title" class="font-black text-xl text-slate-800 uppercase italic leading-none">Tu Pedido</h2>
                    <button id="btn-clear-all" onclick="limpiarCarrito()" class="text-[9px] font-black text-red-500 uppercase tracking-widest mt-2 hidden">
                        <i class="fas fa-broom mr-1"></i> Limpiar Todo
                    </button>
                </div>
                <button onclick="toggleCart()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div id="cart-items" class="flex-1 px-8 overflow-y-auto no-scrollbar"></div>
            
            <div class="p-8 pt-4 bg-white border-t border-slate-100 rounded-t-[2rem]">
                <input id="extra-info" type="text" placeholder="Nombre o referencia de contacto..." class="w-full bg-slate-50 p-4 rounded-2xl text-xs font-bold mb-6 border border-slate-100 outline-none focus:ring-2 focus:ring-slate-900">
                
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Total</p>
                        <p class="text-4xl font-black text-slate-900 tracking-tighter leading-none">$<span id="total-usd">0.00</span></p>
                    </div>
                    <p class="text-lg font-black text-slate-300 italic"><span id="total-bs">0,00</span> Bs.</p>
                </div>
                
                <button onclick="enviarWhatsApp()" class="w-full bg-green-500 text-white py-5 rounded-[2rem] font-black uppercase tracking-[0.15em] text-[11px] flex items-center justify-center space-x-3 shadow-xl active:scale-95 transition-all">
                    <i class="fab fa-whatsapp text-xl"></i>
                    <span id="btn-send-text">Enviar WhatsApp</span>
                </button>
            </div>
        </div>
    </div>

    <footer class="text-center p-8 text-slate-300 text-[9px] font-black uppercase tracking-[0.4em]">
        Digitaliza Urpín • 2024
    </footer>

</body>
</html>
