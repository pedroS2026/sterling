<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitaliza Urpín | Catálogo Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAstAXcgNXevSuTbgZYQ_U9_SwhUI4tzTY",
            authDomain: "digitaliza-urpin.firebaseapp.com",
            projectId: "digitaliza-urpin",
            storageBucket: "digitaliza-urpin.firebasestorage.app",
            messagingSenderId: "634374370608",
            appId: "1:634374370608:web:91861bb040c110d560c4f5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const CLIENTE_ID = "estermendoza"; 
        const APP_ID = "digitaliza-urpin-2026"; 
        
        // --- CONFIGURACIÓN ---
        const SETTINGS = { iva: 0.16, redondear: true };
        let TASA = 0; // Se llenará con la API
        let carrito = [];
        let productosData = [];
        let categoria = "Todas";
        let busqueda = "";

        // Función para obtener la Tasa BCV automáticamente
        async function obtenerTasa() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                // Usamos la tasa de VES (Bolívares)
                TASA = data?.rates?.VES || 45.50; // Fallback por si falla la API
            } catch (error) {
                TASA = 45.50; // Valor manual de respaldo
            }
            document.getElementById('bcv-rate').innerText = `TASA BCV: ${TASA.toFixed(2)} BS.`;
            render();
        }

        window.calc = (p) => {
            const usd = Number(p);
            const factorIVA = (1 + SETTINGS.iva);
            let bs = usd * TASA * factorIVA;
            if (SETTINGS.redondear) bs = Math.ceil(bs);
            return { 
                usd: usd.toFixed(2), 
                bs: bs.toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) 
            };
        };

        async function init() {
            await obtenerTasa(); // Primero buscamos la tasa
            
            const docRef = doc(db, "artifacts", APP_ID, "public", "data", "clientes", CLIENTE_ID);
            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    productosData = snap.data().products || [];
                    document.getElementById('loader-global').style.display = 'none';
                    render();
                }
            });
        }

        function render() {
            if (TASA === 0) return; // Esperar a tener la tasa

            // Render de Categorías
            const cats = ["Todas", ...new Set(productosData.map(p => p.category))];
            document.getElementById('cats').innerHTML = cats.map(c => `
                <button onclick="window.filtrar('${c}')" 
                    class="whitespace-nowrap px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-tighter transition-all duration-300 ${categoria === c ? 'bg-pink-500 text-white shadow-lg shadow-pink-200' : 'bg-white text-slate-400 shadow-sm shadow-slate-100'}">
                    ${c}
                </button>
            `).join('');

            // Render de Productos
            const filtrados = productosData.filter(p => 
                (categoria === "Todas" || p.category === categoria) && 
                p.name.toLowerCase().includes(busqueda.toLowerCase())
            );

            document.getElementById('list').innerHTML = filtrados.map(p => {
                const v = window.calc(p.price);
                return `
                <div class="bg-white p-4 rounded-[2.5rem] shadow-md shadow-slate-200/50 border border-slate-50 flex items-center mb-5 animate__animated animate__fadeInUp">
                    <img src="${p.img || ''}" class="w-24 h-24 rounded-[2rem] object-cover bg-slate-50" onerror="this.src='https://placehold.co/200x200?text=${p.name[0]}'">
                    <div class="ml-5 flex-1">
                        <span class="text-[9px] font-black text-pink-500 uppercase tracking-widest opacity-70">${p.category}</span>
                        <h3 class="text-[13px] font-black text-slate-800 uppercase mb-2">${p.name}</h3>
                        <div class="flex justify-between items-end">
                            <div>
                                <span class="text-xl font-black text-slate-900 tracking-tighter">$${v.usd}</span>
                                <span class="block text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${v.bs} Bs.</span>
                            </div>
                            <button onclick="window.add('${p.id}')" 
                                class="bg-slate-900 text-white w-12 h-12 rounded-[1.2rem] flex items-center justify-center shadow-lg active:scale-90 transition-all">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.filtrar = (c) => { categoria = c; render(); };
        window.buscar = (v) => { busqueda = v; render(); };
        window.add = (id) => {
            const p = productosData.find(x => String(x.id) === String(id));
            const item = carrito.find(x => String(x.id) === String(id));
            if (item) item.qty++; else carrito.push({...p, qty: 1});
            window.upd();
        };

        window.upd = () => {
            const count = carrito.reduce((s, i) => s + i.qty, 0);
            document.getElementById('count').innerText = count;
            document.getElementById('count').classList.toggle('hidden', count === 0);
            
            let tUSD = 0;
            let tBS = 0;

            document.getElementById('items').innerHTML = carrito.map(i => {
                const v = window.calc(i.price);
                tUSD += (i.price * i.qty);
                // Calculamos el total en BS sumando los precios individuales ya calculados
                const bsPuro = parseFloat(v.bs.replace(/\./g, '').replace(',', '.'));
                tBS += (bsPuro * i.qty);
                
                return `<div class="flex justify-between py-4 border-b border-slate-50 items-center">
                    <div class="flex-1">
                        <h4 class="text-[11px] font-black uppercase text-slate-800">${i.name}</h4>
                        <p class="text-[10px] text-slate-400 font-bold">$${i.price.toFixed(2)}</p>
                    </div>
                    <div class="flex items-center gap-3 bg-slate-50 p-1 rounded-xl">
                        <button onclick="window.mod('${i.id}',-1)" class="w-7 h-7 bg-white shadow-sm rounded-lg text-slate-400">-</button>
                        <span class="text-xs font-black w-4 text-center">${i.qty}</span>
                        <button onclick="window.mod('${i.id}',1)" class="w-7 h-7 bg-white shadow-sm rounded-lg text-slate-400">+</button>
                    </div>
                </div>`;
            }).join('') || '<p class="text-center py-10 text-[10px] font-black text-slate-300 uppercase">Vacio</p>';
            
            document.getElementById('t-usd').innerText = tUSD.toFixed(2);
            document.getElementById('t-bs').innerText = tBS.toLocaleString('es-VE', {minimumFractionDigits: 2});
        };

        window.mod = (id, d) => {
            const idx = carrito.findIndex(i => String(i.id) === String(id));
            if (idx !== -1) { 
                carrito[idx].qty += d; 
                if (carrito[idx].qty <= 0) carrito.splice(idx, 1); 
                window.upd(); 
            }
        };

        window.send = () => {
            if(carrito.length === 0) return;
            const tel = "584266662491"; 
            let m = `*🛒 NUEVO PEDIDO*\n*Ester Mendoza Cakes*\n*Tasa:* ${TASA.toFixed(2)} Bs.\n${'—'.repeat(15)}\n`;
            carrito.forEach(i => {
                m += `• ${i.qty}x ${i.name} ($${(i.price * i.qty).toFixed(2)})\n`;
            });
            m += `${'—'.repeat(15)}\n*TOTAL: $${document.getElementById('t-usd').innerText}*\n*TOTAL BS: ${document.getElementById('t-bs').innerText}*`;
            window.open(`https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(m)}`, '_blank');
        };

        init();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="max-w-md mx-auto bg-slate-50 min-h-screen relative overflow-x-hidden">
    <!-- Loader -->
    <div id="loader-global" class="fixed inset-0 bg-white z-[1000] flex items-center justify-center">
        <div class="flex flex-col items-center animate-pulse">
            <div class="w-12 h-12 border-[6px] border-slate-100 border-t-pink-500 rounded-full animate-spin mb-4"></div>
            <span class="text-[10px] font-black uppercase tracking-widest text-slate-400 font-inter">Digitalizando...</span>
        </div>
    </div>

    <!-- Header -->
    <header class="p-8 pt-16 bg-slate-900 text-white rounded-b-[3.5rem] shadow-2xl relative overflow-hidden">
        <div class="flex justify-between items-start relative z-10">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none">Ester <span class="text-pink-500">Mendoza</span></h1>
                <p id="bcv-rate" class="text-[9px] font-bold text-green-400 tracking-widest mt-3 uppercase italic">CARGANDO TASA...</p>
            </div>
            <button onclick="document.getElementById('cart').classList.toggle('translate-y-full')" class="relative">
                <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center border border-white/10 backdrop-blur-md">
                    <i class="fas fa-shopping-basket text-lg text-white"></i>
                </div>
                <span id="count" class="absolute -top-2 -right-2 bg-pink-500 text-white text-[9px] w-5 h-5 rounded-full flex items-center justify-center font-black hidden">0</span>
            </button>
        </div>
        <div class="mt-10 relative z-10">
            <input type="text" onkeyup="window.buscar(this.value)" placeholder="¿QUÉ ANTOJO TIENES HOY?" 
                class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 text-[11px] text-white placeholder:text-white/30 outline-none font-bold focus:bg-white/10 transition-all">
            <i class="fas fa-search absolute left-5 top-4 text-white/20"></i>
        </div>
    </header>

    <!-- Categories -->
    <div id="cats" class="flex space-x-3 overflow-x-auto no-scrollbar px-8 py-6 items-center"></div>

    <!-- Products List -->
    <main id="list" class="px-8 pb-32"></main>

    <!-- Shopping Cart UI -->
    <div id="cart" class="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-md translate-y-full transition-transform duration-500 flex items-end">
        <div class="w-full bg-white rounded-t-[3rem] p-8 max-w-md mx-auto shadow-2xl">
            <div class="w-10 h-1 bg-slate-100 rounded-full mx-auto mb-6"></div>
            <h2 class="text-xl font-black uppercase text-slate-800 mb-6 flex items-center gap-3">
                Tu Pedido <span class="w-2 h-2 bg-pink-500 rounded-full animate-ping"></span>
            </h2>
            <div id="items" class="max-h-[40vh] overflow-y-auto no-scrollbar mb-6"></div>
            <div class="bg-slate-900 rounded-[2rem] p-6 mb-6 flex justify-between items-center text-white">
                <div>
                    <p class="text-[8px] font-black opacity-40 uppercase tracking-widest">Total USD</p>
                    <h3 class="text-2xl font-black tracking-tighter">$<span id="t-usd">0.00</span></h3>
                </div>
                <div class="text-right">
                    <p class="text-[8px] font-black text-pink-500 uppercase tracking-widest">Total BS (Con IVA)</p>
                    <p class="text-lg font-black leading-none"><span id="t-bs">0,00</span> Bs.</p>
                </div>
            </div>
            <button onclick="window.send()" class="w-full bg-green-500 text-white py-5 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg shadow-green-200 flex items-center justify-center gap-3 active:scale-95 transition-all">
                <i class="fab fa-whatsapp text-xl"></i> ENVIAR POR WHATSAPP
            </button>
            <button onclick="document.getElementById('cart').classList.add('translate-y-full')" class="w-full mt-4 text-[9px] font-black text-slate-300 uppercase tracking-widest">Continuar Comprando</button>
        </div>
    </div>
</body>
</html>
