<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitaliza Urpín | Catálogo Inteligente</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAstAXcgNXevSuTbgZYQ_U9_SwhUI4tzTY",
            authDomain: "digitaliza-urpin.firebaseapp.com",
            projectId: "digitaliza-urpin",
            storageBucket: "digitaliza-urpin.firebasestorage.app",
            messagingSenderId: "634374370608",
            appId: "1:634374370608:web:91861bb040c110d560c4f5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // =========================================================================
        // 🟢 MAGIA AQUÍ: LEER EL ID DEL CLIENTE DESDE LA URL DEL QR
        // =========================================================================
        const urlParams = new URLSearchParams(window.location.search);
        const CLIENTE_ID = urlParams.get('id') || "burger_demo"; // Si no hay ID, carga burger_demo por defecto
        
        let TELEFONO_WHATSAPP = ""; // Ahora se llena automáticamente desde Firebase
        let TASA_BCV = 49.00; 
        const IMAGEN_BANNER = "https://images.unsplash.com/photo-1550547660-d9450f859349?w=800&q=60";
        
        let carrito = [];
        let productosData = [];
        let categoriaActual = "Todas";
        let busquedaActual = "";
        let tipoNegocio = "food"; 

        async function actualizarTasaAutomatica() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                if (data && data.rates && data.rates.VES) {
                    TASA_BCV = data.rates.VES;
                    const rateEl = document.getElementById('bcv-rate');
                    if (rateEl) rateEl.innerText = `Tasa BCV: ${TASA_BCV.toFixed(2)} Bs.`;
                }
            } catch (error) {}
        }

        const container = document.getElementById('product-list');
        const cartView = document.getElementById('cart-view');
        const cartItemsContainer = document.getElementById('cart-items');
        const cartCount = document.getElementById('cart-count');
        const totalUsdText = document.getElementById('total-usd');
        const totalBsText = document.getElementById('total-bs');
        const categoryContainer = document.getElementById('category-filters');

        actualizarTasaAutomatica();

        // Escucha de datos en tiempo real (Firebase)
        onSnapshot(doc(db, "clientes", CLIENTE_ID), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                productosData = data.products || [];
                
                // 🟢 OBTENEMOS EL WHATSAPP ESPECÍFICO DE ESTE NEGOCIO
                TELEFONO_WHATSAPP = data.business?.whatsapp || "580000000000";
                
                renderMenu(data);
            } else {
                document.getElementById('shop-name').innerHTML = `Negocio <span class="text-red-500">No Encontrado</span>`;
                container.innerHTML = `<p class="text-center mt-10 text-slate-400">Verifique el código QR.</p>`;
            }
        });

        // DIBUJAR INTERFAZ PRINCIPAL
        function renderMenu(data) {
            const biz = data.business || { name: 'Catálogo', accent: 'Digital', icon: 'fa-store', type: 'food' };
            tipoNegocio = biz.type || 'food'; 
            
            document.getElementById('shop-name').innerHTML = `${biz.name} <span class="text-blue-500">${biz.accent}</span>`;
            document.getElementById('bcv-rate').innerText = `Tasa BCV: ${TASA_BCV.toFixed(2)} Bs.`;
            document.getElementById('header-banner').style.backgroundImage = `url('${IMAGEN_BANNER}')`;
            document.getElementById('shop-icon').className = `fas ${biz.icon || 'fa-store'} text-blue-500 text-xl`;
            
            configurarMetodosEntrega();
            renderCategorias();
            renderProductos();
        }

        function renderCategorias() {
            const categoriasUnicas = ["Todas", ...new Set(productosData.map(p => p.category || 'Varios'))];
            categoryContainer.innerHTML = "";
            categoriasUnicas.forEach(cat => {
                const isActive = cat === categoriaActual;
                const activeClass = isActive ? 'bg-slate-900 text-white shadow-md' : 'bg-white text-slate-500 border border-slate-200';
                categoryContainer.innerHTML += `
                    <button onclick="filtrarCategoria('${cat}')" class="whitespace-nowrap px-4 py-2 rounded-[1rem] text-[11px] font-bold uppercase tracking-widest transition-all ${activeClass}">
                        ${cat}
                    </button>
                `;
            });
        }

        window.filtrarCategoria = (cat) => {
            categoriaActual = cat;
            renderCategorias();
            renderProductos();
        };

        window.buscarProducto = (texto) => {
            busquedaActual = texto.toLowerCase();
            renderProductos();
        };

        function renderProductos() {
            container.innerHTML = ""; 
            let filtrados = productosData.filter(p => {
                const cumpleCategoria = categoriaActual === "Todas" || p.category === categoriaActual;
                const cumpleBusqueda = p.name.toLowerCase().includes(busquedaActual) || (p.desc && p.desc.toLowerCase().includes(busquedaActual));
                return cumpleCategoria && cumpleBusqueda;
            });

            if (filtrados.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center py-20 opacity-40">
                        <i class="fas fa-search text-4xl mb-4"></i>
                        <p class="text-[10px] font-bold uppercase tracking-[0.2em]">No hay resultados</p>
                    </div>`;
                return;
            }

            filtrados.forEach(p => {
                const pBs = (p.price * TASA_BCV).toLocaleString('es-VE', { minimumFractionDigits: 2 });
                container.innerHTML += `
                    <div class="product-card bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 mb-6 transition-all duration-300">
                        <div class="flex p-4 items-center">
                            <div class="w-24 h-24 rounded-[1.5rem] overflow-hidden bg-slate-50 flex-shrink-0 shadow-inner relative">
                                <img src="${p.img}" class="w-full h-full object-cover" loading="lazy" onerror="this.src='https://via.placeholder.com/150?text=Imagen'">
                            </div>
                            <div class="ml-5 flex-1">
                                <div class="flex justify-between items-start">
                                    <h3 class="font-black text-slate-800 text-[13px] uppercase tracking-tight leading-none">${p.name}</h3>
                                </div>
                                <p class="text-[10px] text-slate-400 leading-snug mt-1 line-clamp-2 font-medium">${p.desc || ''}</p>
                                <div class="flex justify-between items-center mt-3">
                                    <div class="flex flex-col">
                                        <span class="text-lg font-black text-slate-900 leading-none">$${p.price.toFixed(2)}</span>
                                        <span class="text-[9px] font-bold text-blue-600 mt-1">${pBs} Bs.</span>
                                    </div>
                                    <button onclick="agregarAlCarrito(${p.id})" class="bg-slate-900 text-white w-10 h-10 rounded-2xl shadow-lg flex items-center justify-center active:scale-90 transition-all hover:bg-blue-600">
                                        <i class="fas fa-plus text-[10px]"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.agregarAlCarrito = (id) => {
            const prod = productosData.find(p => p.id === id);
            const index = carrito.findIndex(item => item.id === id);
            if (index > -1) {
                carrito[index].qty++;
            } else {
                carrito.push({...prod, qty: 1});
            }
            actualizarUI();
        };

        window.quitarDelCarrito = (id) => {
            const index = carrito.findIndex(item => item.id === id);
            if (index > -1) {
                if (carrito[index].qty > 1) carrito[index].qty--;
                else carrito.splice(index, 1);
            }
            actualizarUI();
        };

        window.vaciarCarrito = () => {
            if (carrito.length === 0) return;
            carrito = [];
            actualizarUI();
            toggleCart();
        };

        function actualizarUI() {
            const totalItems = carrito.reduce((acc, item) => acc + item.qty, 0);
            cartCount.innerText = totalItems;
            cartCount.classList.toggle('hidden', totalItems === 0);
            renderCart();
        }

        function renderCart() {
            cartItemsContainer.innerHTML = "";
            let total = 0;
            if (carrito.length === 0) {
                cartItemsContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full opacity-30 py-10">
                        <i class="fas fa-shopping-basket text-5xl mb-4"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest">El carrito está vacío</p>
                    </div>
                `;
            }
            carrito.forEach(item => {
                total += item.price * item.qty;
                cartItemsContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-4 rounded-3xl mb-3 border border-slate-50 shadow-sm">
                        <div class="flex-1 pr-2">
                            <p class="text-[11px] font-black text-slate-800 uppercase leading-none">${item.name}</p>
                            <p class="text-[10px] text-slate-500 mt-1">$${item.price.toFixed(2)}</p>
                        </div>
                        <div class="flex items-center space-x-3">
                            <button onclick="quitarDelCarrito(${item.id})" class="w-8 h-8 bg-slate-100 rounded-xl text-slate-400"><i class="fas fa-minus text-[8px]"></i></button>
                            <span class="text-xs font-black text-slate-800">${item.qty}</span>
                            <button onclick="agregarAlCarrito(${item.id})" class="w-8 h-8 bg-slate-900 rounded-xl text-white"><i class="fas fa-plus text-[8px]"></i></button>
                        </div>
                    </div>
                `;
            });
            totalUsdText.innerText = total.toFixed(2);
            totalBsText.innerText = (total * TASA_BCV).toLocaleString('es-VE', { minimumFractionDigits: 2 });
        }

        window.toggleCart = () => {
            cartView.classList.toggle('translate-y-full');
        };

        function configurarMetodosEntrega() {
            const containerMetodos = document.getElementById('metodos-entrega-container');
            const tituloMetodos = document.getElementById('titulo-metodos');
            const inputExtra = document.getElementById('mesa-input');
            
            if (tipoNegocio === 'retail') {
                tituloMetodos.innerText = "¿Cómo deseas recibir tu compra?";
                inputExtra.placeholder = "Indica tu dirección o datos de quien retira";
                containerMetodos.innerHTML = `
                    <label class="flex flex-col items-center p-4 bg-slate-50 rounded-[1.5rem] border-2 border-transparent cursor-pointer has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                        <input type="radio" name="metodo" value="retiro" checked class="hidden">
                        <i class="fas fa-store mb-1 text-slate-400"></i>
                        <span class="text-[9px] font-black uppercase text-center">Retiro en<br>Tienda</span>
                    </label>
                    <label class="flex flex-col items-center p-4 bg-slate-50 rounded-[1.5rem] border-2 border-transparent cursor-pointer has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                        <input type="radio" name="metodo" value="envio" class="hidden">
                        <i class="fas fa-truck mb-1 text-slate-400"></i>
                        <span class="text-[9px] font-black uppercase text-center">Envío a<br>Domicilio</span>
                    </label>
                `;
                containerMetodos.className = "grid grid-cols-2 gap-3 mb-6";
            } else {
                tituloMetodos.innerText = "¿Cómo recibes tu pedido?";
                inputExtra.placeholder = "Mesa o Dirección";
                containerMetodos.innerHTML = `
                    <label class="flex flex-col items-center p-4 bg-slate-50 rounded-[1.5rem] border-2 border-transparent cursor-pointer has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                        <input type="radio" name="metodo" value="mesa" checked class="hidden">
                        <i class="fas fa-chair mb-1 text-slate-400"></i>
                        <span class="text-[9px] font-black uppercase">Mesa</span>
                    </label>
                    <label class="flex flex-col items-center p-4 bg-slate-50 rounded-[1.5rem] border-2 border-transparent cursor-pointer has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                        <input type="radio" name="metodo" value="llevar" class="hidden">
                        <i class="fas fa-shopping-basket mb-1 text-slate-400"></i>
                        <span class="text-[9px] font-black uppercase">Llevar</span>
                    </label>
                    <label class="flex flex-col items-center p-4 bg-slate-50 rounded-[1.5rem] border-2 border-transparent cursor-pointer has-[:checked]:border-blue-500 has-[:checked]:bg-blue-50">
                        <input type="radio" name="metodo" value="delivery" class="hidden">
                        <i class="fas fa-motorcycle mb-1 text-slate-400"></i>
                        <span class="text-[9px] font-black uppercase">Delivery</span>
                    </label>
                `;
                containerMetodos.className = "grid grid-cols-3 gap-3 mb-6";
            }
        }

        window.enviarPedido = () => {
            if (carrito.length === 0) return;
            const metodo = document.querySelector('input[name="metodo"]:checked').value;
            const extrasInfo = document.getElementById('mesa-input').value;
            
            let texto = tipoNegocio === 'retail' ? `*NUEVA COTIZACIÓN/ORDEN*\n` : `*NUEVO PEDIDO*\n`;
            texto += `--------------------------\n`;
            
            carrito.forEach(item => { 
                texto += `• ${item.qty}x ${item.name} ($${(item.price * item.qty).toFixed(2)})\n`; 
            });
            
            texto += `--------------------------\n`;
            texto += `*TOTAL:* $${totalUsdText.innerText} (${totalBsText.innerText} Bs.)\n`;
            texto += `*MÉTODO:* ${metodo.toUpperCase()}\n`;
            
            if (extrasInfo) {
                texto += tipoNegocio === 'retail' ? `*NOTAS/DIRECCIÓN:* ${extrasInfo}` : `*MESA/DIR:* ${extrasInfo}`;
            }

            const url = `https://wa.me/${TELEFONO_WHATSAPP}?text=${encodeURIComponent(texto)}`;
            window.open(url, '_blank');
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .cart-panel { transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1); }
        .header-banner-img { filter: blur(2px) brightness(0.7); background-size: cover; background-position: center; }
        .header-gradient { background: linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="pb-24">

    <div id="header-banner" class="header-banner-img h-56 w-full relative">
        <div class="absolute inset-0 header-gradient"></div>
    </div>

    <header class="max-w-md mx-auto -mt-14 relative z-20 px-4">
        <div class="bg-white p-5 rounded-[2.5rem] shadow-xl border border-slate-50 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <div class="w-14 h-14 bg-slate-900 rounded-[1.5rem] flex items-center justify-center text-white shadow-2xl">
                    <i id="shop-icon" class="fas fa-store"></i>
                </div>
                <div>
                    <h1 id="shop-name" class="font-black text-slate-800 text-lg uppercase tracking-tighter italic leading-none">Cargando...</h1>
                    <div class="flex items-center space-x-2 mt-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <p id="bcv-rate" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">Tasa BCV: --</p>
                    </div>
                </div>
            </div>
            <button onclick="toggleCart()" class="relative w-14 h-14 bg-blue-50 rounded-[1.5rem] flex items-center justify-center text-blue-600 border border-blue-100 shadow-sm active:scale-90 transition-all">
                <i class="fas fa-shopping-cart text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-6 h-6 rounded-full border-2 border-white flex items-center justify-center font-black hidden shadow-md">0</span>
            </button>
        </div>
    </header>

    <section class="max-w-md mx-auto px-4 mt-6">
        <div class="relative w-full mb-4">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <i class="fas fa-search text-slate-300"></i>
            </div>
            <input type="text" onkeyup="buscarProducto(this.value)" placeholder="Buscar producto..." class="w-full bg-white border border-slate-200 text-slate-800 text-xs rounded-[1.5rem] pl-10 pr-4 py-4 focus:ring-2 focus:ring-blue-500 focus:outline-none shadow-sm transition-all">
        </div>
        <div id="category-filters" class="flex overflow-x-auto space-x-2 no-scrollbar py-1"></div>
    </section>

    <main id="product-list" class="max-w-md mx-auto p-4 mt-2"></main>

    <div id="cart-view" class="cart-panel fixed inset-0 z-50 bg-white translate-y-full flex flex-col">
        <div class="p-6 border-b flex justify-between items-center">
            <button onclick="toggleCart()" class="w-12 h-12 bg-slate-50 rounded-2xl text-slate-400"><i class="fas fa-times"></i></button>
            <h2 class="font-black text-slate-800 uppercase italic">Tu Carrito</h2>
            <button onclick="vaciarCarrito()" class="w-12 h-12 bg-red-50 rounded-2xl text-red-500"><i class="fas fa-trash-alt"></i></button>
        </div>
        
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 bg-slate-50/50"></div>
        
        <div class="p-8 bg-white border-t rounded-t-[3rem] shadow-[0_-15px_40px_-15px_rgba(0,0,0,0.1)]">
            <h3 id="titulo-metodos" class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-4">MÉTODO DE ENTREGA</h3>
            <div id="metodos-entrega-container"></div>
            <input type="text" id="mesa-input" placeholder="Datos extra..." class="w-full bg-slate-50 border-none p-5 rounded-2xl text-xs mb-6 focus:ring-2 focus:ring-blue-500">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total</p>
                    <p class="text-4xl font-black text-slate-900 leading-none tracking-tighter">$<span id="total-usd">0.00</span></p>
                </div>
                <div class="text-right">
                    <p class="text-xl font-black text-blue-600 tracking-tighter"><span id="total-bs">0,00</span> Bs.</p>
                </div>
            </div>
            <button onclick="enviarPedido()" class="w-full bg-green-500 text-white py-6 rounded-[2rem] font-black uppercase tracking-widest shadow-xl flex items-center justify-center space-x-3 active:scale-95 transition-all">
                <i class="fab fa-whatsapp text-2xl"></i>
                <span>Confirmar y Enviar</span>
            </button>
        </div>
    </div>

    <footer class="p-10 text-center">
        <span class="text-[8px] font-black text-slate-300 uppercase tracking-[0.2em]">Digitaliza Urpín 2026</span>
    </footer>

</body>
</html>
