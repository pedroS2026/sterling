<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitaliza Urpín | Catálogo Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAstAXcgNXevSuTbgZYQ_U9_SwhUI4tzTY",
            authDomain: "digitaliza-urpin.firebaseapp.com",
            projectId: "digitaliza-urpin",
            storageBucket: "digitaliza-urpin.firebasestorage.app",
            messagingSenderId: "634374370608",
            appId: "1:634374370608:web:91861bb040c110d560c4f5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const params = new URLSearchParams(window.location.search);
        const CLIENTE_ID = params.get('id') || "estermendoza"; 
        const APP_ID = "digitaliza-urpin-2026"; 
        
        const SETTINGS = { iva: 0.16, redondear: true };
        let TASA = 45.00, carrito = [], productosData = [], categoria = "Todas", busqueda = "", negocio = {};

        // Lógica: USD limpio, BS con IVA
        window.calc = (p) => {
            const usd = Number(p);
            const bs = SETTINGS.redondear ? Math.ceil((usd * (1 + SETTINGS.iva)) * TASA) : (usd * (1 + SETTINGS.iva)) * TASA;
            return { 
                usd: usd.toFixed(2), 
                bs: bs.toLocaleString('es-VE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) 
            };
        };

        async function fetchTasa() {
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/USD');
                const d = await r.json();
                if (d?.rates?.VES) TASA = d.rates.VES;
                document.getElementById('bcv-rate').innerText = `TASA BCV: ${TASA.toFixed(2)} BS.`;
            } catch (e) { 
                document.getElementById('bcv-rate').innerText = `TASA REF: ${TASA.toFixed(2)} BS.`; 
            }
        }

        async function init() {
            await fetchTasa();
            onSnapshot(doc(db, "artifacts", APP_ID, "public", "data", "clientes", CLIENTE_ID), (snap) => {
                if (snap.exists()) {
                    const d = snap.data();
                    productosData = d.products || [];
                    negocio = d.business || { name: "Digitaliza", accent: "Urpín", type: "food" };
                    document.getElementById('loader-global').style.display = 'none';
                    render();
                }
            });
        }

        function render() {
            // Colores por tipo de negocio
            const colorMap = { 
                food: 'orange-500', 
                parts: 'blue-600', 
                bakery: 'pink-500', 
                store: 'emerald-600' 
            };
            const themeColor = colorMap[negocio.type] || 'orange-500';
            
            // Header y Branding
            document.getElementById('shop-name').innerHTML = `${negocio.name} <span class="text-${themeColor}">${negocio.accent}</span>`;
            
            // Categorías con Estilo Premium
            const cats = ["Todas", ...new Set(productosData.map(p => p.category))];
            document.getElementById('cats').innerHTML = cats.map(c => `
                <button onclick="window.filtrar('${c}')" 
                    class="whitespace-nowrap px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-tighter transition-all duration-300 ${categoria === c ? `bg-${themeColor} text-white shadow-lg scale-105` : 'bg-white text-slate-400 shadow-sm'}">
                    ${c}
                </button>
            `).join('');

            // Listado de Productos con Diseño "Card"
            const filtrados = productosData.filter(p => 
                (categoria === "Todas" || p.category === categoria) && 
                p.name.toLowerCase().includes(busqueda.toLowerCase())
            );

            document.getElementById('list').innerHTML = filtrados.map(p => {
                const v = window.calc(p.price);
                return `
                <div class="bg-white p-4 rounded-[2.5rem] shadow-md shadow-slate-200/50 border border-slate-50 flex items-center mb-5 animate__animated animate__fadeInUp">
                    <div class="relative">
                        <img src="${p.img || ''}" class="w-24 h-24 rounded-[2rem] object-cover bg-slate-50 shadow-inner" onerror="this.src='https://placehold.co/200x200?text=${p.name[0]}'">
                    </div>
                    <div class="ml-5 flex-1">
                        <span class="text-[9px] font-black text-${themeColor} uppercase tracking-widest opacity-70">${p.category}</span>
                        <h3 class="text-[13px] font-black text-slate-800 uppercase leading-tight mb-2">${p.name}</h3>
                        <div class="flex justify-between items-end">
                            <div>
                                <span class="text-xl font-black text-slate-900 tracking-tighter">$${v.usd}</span>
                                <span class="block text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${v.bs} Bs. <span class="text-[8px] opacity-50">+IVA</span></span>
                            </div>
                            <button onclick="window.add('${p.id}')" 
                                class="bg-${themeColor} text-white w-12 h-12 rounded-[1.2rem] flex items-center justify-center shadow-lg active:scale-90 transition-all hover:rotate-12">
                                <i class="fas fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        window.filtrar = (c) => { categoria = c; render(); };
        window.buscar = (v) => { busqueda = v; render(); };

        window.add = (id) => {
            const p = productosData.find(x => String(x.id) === String(id));
            const item = carrito.find(x => String(x.id) === String(id));
            if (item) item.qty++; else carrito.push({...p, qty: 1});
            window.upd();
        };

        window.upd = () => {
            const count = carrito.reduce((s, i) => s + i.qty, 0);
            const countBadge = document.getElementById('count');
            countBadge.innerText = count;
            countBadge.classList.toggle('hidden', count === 0);
            
            let tUSD = 0, tBS = 0;
            document.getElementById('items').innerHTML = carrito.map(i => {
                const v = window.calc(i.price);
                const subUSD = i.price * i.qty;
                const subBS = parseFloat(v.bs.replace(/\./g, '').replace(',', '.')) * i.qty;
                tUSD += subUSD;
                tBS += subBS;
                
                return `<div class="flex justify-between py-5 border-b border-slate-50 items-center">
                    <div class="flex-1">
                        <h4 class="text-[11px] font-black uppercase text-slate-800">${i.name}</h4>
                        <p class="text-[10px] text-slate-400 font-bold">$${i.price.toFixed(2)} c/u</p>
                    </div>
                    <div class="flex items-center gap-3 bg-slate-50 p-1 rounded-2xl">
                        <button onclick="window.mod('${i.id}',-1)" class="w-8 h-8 bg-white shadow-sm rounded-xl text-slate-400 hover:text-red-500 transition-colors">-</button>
                        <span class="text-xs font-black w-4 text-center">${i.qty}</span>
                        <button onclick="window.mod('${i.id}',1)" class="w-8 h-8 bg-white shadow-sm rounded-xl text-slate-400 hover:text-green-500 transition-colors">+</button>
                    </div>
                </div>`;
            }).join('') || '<div class="text-center py-12"><i class="fas fa-shopping-basket text-4xl text-slate-100 mb-4 block"></i><p class="text-[10px] text-slate-300 font-black uppercase tracking-widest">Carrito Vacío</p></div>';
            
            document.getElementById('t-usd').innerText = tUSD.toFixed(2);
            document.getElementById('t-bs').innerText = tBS.toLocaleString('es-VE', {minimumFractionDigits: 2});
        };

        window.mod = (id, d) => {
            const idx = carrito.findIndex(i => String(i.id) === String(id));
            if (idx !== -1) { 
                carrito[idx].qty += d; 
                if (carrito[idx].qty <= 0) carrito.splice(idx, 1); 
                window.upd(); 
            }
        };

        window.send = () => {
            if(carrito.length === 0) return;
            const tel = (negocio.whatsapp || '584266662491').replace(/\D/g, '');
            let m = `*🛒 NUEVO PEDIDO*\n*Cliente:* ${CLIENTE_ID}\n*Tienda:* ${negocio.name}\n${'—'.repeat(15)}\n`;
            carrito.forEach(i => {
                const v = window.calc(i.price);
                m += `• *${i.qty}x* ${i.name}\n   Sub: $${(i.price * i.qty).toFixed(2)} | ${ (parseFloat(v.bs.replace(/\./g, '').replace(',', '.')) * i.qty).toLocaleString('es-VE') } Bs.\n`;
            });
            m += `${'—'.repeat(15)}\n*TOTAL NETO: $${document.getElementById('t-usd').innerText}*\n*TOTAL (IVA INCL.): ${document.getElementById('t-bs').innerText} Bs.*\n\n_Generado desde Catálogo Digital_`;
            window.open(`https://api.whatsapp.com/send?phone=${tel}&text=${encodeURIComponent(m)}`, '_blank');
        };

        init();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input::placeholder { color: rgba(255,255,255,0.3); text-transform: uppercase; font-size: 10px; font-weight: 900; letter-spacing: 0.1em; }
        .cart-shadow { box-shadow: 0 -20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="max-w-md mx-auto bg-slate-50 min-h-screen relative overflow-x-hidden">
    <!-- Loader elegante -->
    <div id="loader-global" class="fixed inset-0 bg-white z-[1000] flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 border-[6px] border-slate-100 border-t-slate-900 rounded-full animate-spin mb-4"></div>
            <span class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-400">Cargando Experiencia</span>
        </div>
    </div>

    <!-- Header estilizado -->
    <header class="p-8 pt-16 bg-slate-900 text-white rounded-b-[4rem] shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full -mr-32 -mt-32 blur-3xl"></div>
        <div class="relative z-10 flex justify-between items-start">
            <div>
                <h1 id="shop-name" class="text-3xl font-black italic tracking-tighter uppercase leading-none">...</h1>
                <p id="bcv-rate" class="text-[9px] font-bold text-white/30 tracking-[0.2em] mt-3 uppercase"></p>
            </div>
            <button onclick="document.getElementById('cart').classList.toggle('translate-y-full')" class="relative group">
                <div class="w-14 h-14 bg-white/10 rounded-[1.5rem] flex items-center justify-center border border-white/10 transition-all group-active:scale-90">
                    <i class="fas fa-shopping-basket text-xl text-white/90"></i>
                </div>
                <span id="count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-6 h-6 rounded-full flex items-center justify-center font-black hidden border-4 border-slate-900 animate__animated animate__bounceIn">0</span>
            </button>
        </div>
        <div class="mt-10 relative group">
            <input type="text" onkeyup="window.buscar(this.value)" placeholder="Encuentra lo que buscas..." 
                class="w-full bg-white/5 border border-white/10 rounded-[1.5rem] py-5 pl-14 text-[11px] text-white outline-none font-bold focus:bg-white/10 focus:border-white/20 transition-all">
            <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-white/20 group-focus-within:text-white/50 transition-colors"></i>
        </div>
    </header>

    <!-- Filtros -->
    <div id="cats" class="flex space-x-4 overflow-x-auto no-scrollbar px-8 py-8 items-center"></div>

    <!-- Lista de Productos -->
    <main id="list" class="px-8 pb-40"></main>

    <!-- Carrito Deslizable -->
    <div id="cart" class="fixed inset-0 z-[100] bg-slate-900/40 backdrop-blur-md translate-y-full transition-transform duration-700 ease-[cubic-bezier(0.23,1,0.32,1)] flex items-end">
        <div class="w-full bg-white rounded-t-[4rem] p-10 max-w-md mx-auto cart-shadow">
            <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
            <div class="flex justify-between items-center mb-8">
                <h2 class="font-black text-2xl uppercase italic tracking-tighter text-slate-800">Mi Carrito</h2>
                <button onclick="document.getElementById('cart').classList.toggle('translate-y-full')" class="w-10 h-10 flex items-center justify-center text-slate-300 hover:text-slate-900">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <div id="items" class="max-h-[40vh] overflow-y-auto no-scrollbar mb-8 pr-2"></div>
            
            <div class="bg-slate-900 rounded-[2.5rem] p-8 mb-8 flex justify-between items-center shadow-xl shadow-slate-200">
                <div>
                    <p class="text-[10px] font-black text-white/40 uppercase tracking-widest mb-1">Total Neto</p>
                    <h3 class="text-3xl font-black text-white tracking-tighter">$<span id="t-usd">0.00</span></h3>
                </div>
                <div class="text-right border-l border-white/10 pl-6">
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">Total (IVA Incl.)</p>
                    <p class="text-xl font-black text-white leading-none"><span id="t-bs">0,00</span> <span class="text-[10px] opacity-60">Bs.</span></p>
                </div>
            </div>
            
            <button onclick="window.send()" 
                class="w-full bg-green-500 hover:bg-green-600 text-white py-6 rounded-[2rem] font-black uppercase text-[11px] tracking-[0.2em] shadow-lg shadow-green-200 flex items-center justify-center gap-4 transition-all active:scale-95">
                <i class="fab fa-whatsapp text-2xl"></i> CONFIRMAR PEDIDO
            </button>
        </div>
    </div>
</body>
</html>
