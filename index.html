<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitaliza Urpín | Sistema Universal de Catálogo</title>
    
    <!-- Frameworks y Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAstAXcgNXevSuTbgZYQ_U9_SwhUI4tzTY",
            authDomain: "digitaliza-urpin.firebaseapp.com",
            projectId: "digitaliza-urpin",
            storageBucket: "digitaliza-urpin.firebasestorage.app",
            messagingSenderId: "634374370608",
            appId: "1:634374370608:web:91861bb040c110d560c4f5"
        };

        // Inicialización de Servicios
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Variables de Estado Global
        const params = new URLSearchParams(window.location.search);
        const CLIENTE_ID = params.get('id') || "demo"; 
        const APP_ID = "digitaliza-urpin-2026"; 
        
        let TASA_BCV = 49.50; 
        let carrito = [];
        let productosData = [];
        let categoriaActual = "Todas";
        let busquedaActual = "";
        let configNegocio = {};

        // Diccionario de Temas Visuales
        const temas = {
            food: { primary: 'orange-500', secondary: 'orange-600', bg: 'slate-900', label: 'Pedido', icon: 'fa-shopping-cart' },
            parts: { primary: 'blue-500', secondary: 'blue-700', bg: 'slate-900', label: 'Cotización', icon: 'fa-cog' },
            bakery: { primary: 'pink-500', secondary: 'pink-600', bg: 'stone-900', label: 'Encargo', icon: 'fa-birthday-cake' },
            store: { primary: 'emerald-600', secondary: 'emerald-800', bg: 'zinc-900', label: 'Compra', icon: 'fa-shopping-bag' }
        };

        // Función para obtener tasa en tiempo real
        async function actualizarTasa() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                if (data && data.rates && data.rates.VES) {
                    TASA_BCV = data.rates.VES;
                    const bcvEl = document.getElementById('bcv-rate');
                    if (bcvEl) bcvEl.innerText = `TASA BCV: ${TASA_BCV.toFixed(2)} BS.`;
                    renderInterface(); // Re-renderizar precios con la nueva tasa
                }
            } catch (error) {
                console.error("Error obteniendo tasa:", error);
            }
        }

        // Listener de Datos en Tiempo Real (Firestore)
        const docRef = doc(db, "artifacts", APP_ID, "public", "data", "clientes", CLIENTE_ID);

        onSnapshot(docRef, (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                productosData = data.products || [];
                configNegocio = data.business || {};
                
                // Ocultar loader y renderizar
                setTimeout(() => {
                    document.getElementById('loader-global').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loader-global').style.display = 'none';
                    }, 500);
                }, 1000);
                
                renderInterface();
            } else {
                console.error("No se encontró el documento para el ID:", CLIENTE_ID);
                document.getElementById('shop-name').innerText = "Negocio no registrado";
            }
        }, (error) => {
            console.error("Error en Snapshot:", error);
        });

        // Motor de Renderizado Principal
        function renderInterface() {
            const tipo = configNegocio.type || 'food';
            const tema = temas[tipo] || temas.food;
            
            // Actualizar Colores de Cabecera
            const header = document.getElementById('main-header');
            if (header) {
                header.style.backgroundColor = tema.bg === 'slate-900' ? '#0f172a' : (tema.bg === 'stone-900' ? '#1c1917' : '#18181b');
            }

            // Nombre del Negocio con Acento
            const shopName = document.getElementById('shop-name');
            if (shopName) {
                shopName.innerHTML = `${configNegocio.name || 'Digitaliza'} <span class="text-${tema.primary}">${configNegocio.accent || 'Urpín'}</span>`;
            }

            // Icono del Carrito Dinámico
            const cartIcon = document.getElementById('cart-icon');
            if (cartIcon) {
                cartIcon.className = `fas ${tema.icon} text-${tema.primary} text-xl`;
            }

            // Etiquetas de Modal y Botón
            document.getElementById('modal-title').innerText = `Detalle de tu ${tema.label}`;
            document.getElementById('btn-send-text').innerText = `Enviar ${tema.label} vía WhatsApp`;

            renderCategorias(tema);
            renderProductos(tema);
        }

        // Renderizado de Filtros de Categoría
        function renderCategorias(tema) {
            const container = document.getElementById('category-filters');
            const categoriasUnicas = ["Todas", ...new Set(productosData.map(p => p.category))];
            
            container.innerHTML = categoriasUnicas.map(cat => {
                const esActiva = categoriaActual === cat;
                return `
                    <button onclick="window.filtrar('${cat}')" 
                        class="px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all duration-300 whitespace-nowrap 
                        ${esActiva ? `bg-${tema.primary} text-white shadow-lg shadow-${tema.primary}/30 scale-105` : 'bg-white text-slate-400 border border-slate-100 hover:border-slate-200'}">
                        ${cat}
                    </button>
                `;
            }).join('');
        }

        // Renderizado de Lista de Productos
        function renderProductos(tema) {
            const container = document.getElementById('product-list');
            const filtrados = productosData.filter(p => {
                const matchCat = categoriaActual === "Todas" || p.category === categoriaActual;
                const matchSearch = p.name.toLowerCase().includes(busquedaActual.toLowerCase());
                return matchCat && matchSearch;
            });

            if (filtrados.length === 0) {
                container.innerHTML = `
                    <div class="py-20 text-center">
                        <i class="fas fa-search text-slate-200 text-5xl mb-4"></i>
                        <p class="text-slate-400 font-bold uppercase text-[10px]">No se encontraron resultados</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtrados.map(p => {
                const precioBs = (Number(p.price) * TASA_BCV).toFixed(2);
                return `
                    <div class="bg-white p-4 rounded-[2.5rem] shadow-sm border border-slate-100 flex items-center mb-5 animate__animated animate__fadeInUp">
                        <div class="relative">
                            <img src="${p.img || ''}" alt="${p.name}" 
                                class="w-24 h-24 rounded-[2rem] object-cover bg-slate-50 border border-slate-50 shadow-inner"
                                onerror="this.src='https://placehold.co/200x200/f8fafc/64748b?text=${encodeURIComponent(p.name)}'">
                        </div>
                        <div class="ml-5 flex-1">
                            <div class="mb-2">
                                <h3 class="text-[12px] font-black text-slate-800 uppercase tracking-tight leading-tight">${p.name}</h3>
                                <span class="inline-block px-2 py-0.5 bg-slate-50 text-slate-400 text-[8px] font-bold rounded-lg uppercase mt-1 tracking-wider border border-slate-100">
                                    ${p.category}
                                </span>
                            </div>
                            <div class="flex justify-between items-end">
                                <div>
                                    <span class="text-xl font-black text-slate-900 tracking-tighter">$${Number(p.price).toFixed(2)}</span>
                                    <span class="block text-[10px] font-bold text-slate-400 uppercase leading-none mt-0.5">${precioBs} Bs.</span>
                                </div>
                                <button onclick="window.agregarCarrito('${p.id}')" 
                                    class="bg-${tema.primary} hover:bg-${tema.secondary} text-white w-12 h-12 rounded-[1.2rem] flex items-center justify-center shadow-lg shadow-${tema.primary}/20 active:scale-90 transition-all">
                                    <i class="fas fa-plus text-sm"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Lógica del Carrito
        window.agregarCarrito = (id) => {
            const producto = productosData.find(p => String(p.id) === String(id));
            if (!producto) return;

            const existente = carrito.find(item => String(item.id) === String(id));
            if (existente) {
                existente.qty++;
            } else {
                carrito.push({ ...producto, qty: 1 });
            }
            
            window.notificar(`Añadido: ${producto.name}`);
            window.actualizarContadores();
        };

        window.actualizarContadores = () => {
            const count = carrito.reduce((sum, item) => sum + item.qty, 0);
            const badge = document.getElementById('cart-count');
            
            if (count > 0) {
                badge.innerText = count;
                badge.classList.remove('hidden');
                badge.classList.add('animate__animated', 'animate__bounceIn');
            } else {
                badge.classList.add('hidden');
            }

            renderCarritoModal();
        };

        function renderCarritoModal() {
            const container = document.getElementById('cart-items');
            let totalUSD = 0;

            if (carrito.length === 0) {
                container.innerHTML = `
                    <div class="py-12 text-center">
                        <i class="fas fa-shopping-basket text-slate-100 text-6xl mb-4"></i>
                        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest leading-loose">Tu carrito está esperando<br>por tus antojos</p>
                    </div>
                `;
                document.getElementById('total-usd').innerText = "0.00";
                document.getElementById('total-bs').innerText = "0,00";
                return;
            }

            container.innerHTML = carrito.map(item => {
                const subtotal = item.price * item.qty;
                totalUSD += subtotal;
                return `
                    <div class="flex items-center justify-between py-4 border-b border-slate-50">
                        <div class="flex-1">
                            <h4 class="text-[11px] font-black uppercase text-slate-800">${item.name}</h4>
                            <div class="flex items-center mt-1 space-x-4">
                                <div class="flex items-center bg-slate-50 rounded-lg border border-slate-100 p-1">
                                    <button onclick="window.cambiarCant('${item.id}', -1)" class="w-6 h-6 flex items-center justify-center text-slate-400 hover:text-red-500"><i class="fas fa-minus text-[8px]"></i></button>
                                    <span class="px-3 text-[10px] font-black text-slate-600">${item.qty}</span>
                                    <button onclick="window.cambiarCant('${item.id}', 1)" class="w-6 h-6 flex items-center justify-center text-slate-400 hover:text-green-500"><i class="fas fa-plus text-[8px]"></i></button>
                                </div>
                                <span class="text-[10px] font-bold text-slate-400">$${item.price.toFixed(2)} c/u</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black text-slate-900">$${subtotal.toFixed(2)}</p>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('total-usd').innerText = totalUSD.toFixed(2);
            document.getElementById('total-bs').innerText = (totalUSD * TASA_BCV).toLocaleString('es-VE', {minimumFractionDigits: 2});
        }

        window.cambiarCant = (id, delta) => {
            const index = carrito.findIndex(i => String(i.id) === String(id));
            if (index === -1) return;

            carrito[index].qty += delta;
            if (carrito[index].qty <= 0) {
                carrito.splice(index, 1);
            }
            window.actualizarContadores();
        };

        // Utilidades de Interfaz
        window.filtrar = (cat) => {
            categoriaActual = cat;
            renderInterface();
        };

        window.buscar = (texto) => {
            busquedaActual = texto;
            renderInterface();
        };

        window.toggleCart = () => {
            const modal = document.getElementById('cart-view');
            modal.classList.toggle('translate-y-full');
        };

        window.notificar = (msg) => {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            toast.classList.add('animate__fadeInUp');
            setTimeout(() => {
                toast.classList.remove('animate__fadeInUp');
                toast.classList.add('animate__fadeOutDown');
                setTimeout(() => { toast.classList.add('hidden'); toast.classList.remove('animate__fadeOutDown'); }, 500);
            }, 2500);
        };

        window.enviarWhatsApp = () => {
            if (carrito.length === 0) return;
            
            const tipo = configNegocio.type || 'food';
            const label = temas[tipo]?.label || 'Pedido';
            const telefono = (configNegocio.whatsapp || '584266662491').replace(/\D/g, '');
            
            let mensaje = `*NUEVO ${label.toUpperCase()} - ${configNegocio.name || 'CLIENTE'}*\n`;
            mensaje += `_Enviado desde el Menú Digital_\n`;
            mensaje += `----------------------------\n`;
            
            carrito.forEach(item => {
                mensaje += `✅ *${item.qty}x* ${item.name.toUpperCase()}\n`;
                mensaje += `   Subtotal: $${(item.price * item.qty).toFixed(2)}\n\n`;
            });

            mensaje += `----------------------------\n`;
            mensaje += `*TOTAL A PAGAR: $${document.getElementById('total-usd').innerText}*\n`;
            mensaje += `*EQUIVALENTE BS: ${document.getElementById('total-bs').innerText} BS.*\n`;
            mensaje += `----------------------------\n`;
            mensaje += `_Por favor, confírmeme la disponibilidad._`;

            const url = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        };

        // Ejecución Inicial
        actualizarTasa();

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        
        :root { --app-primary: #f97316; }
        
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input::placeholder { color: rgba(255,255,255,0.3); font-weight: 700; text-transform: uppercase; font-size: 9px; letter-spacing: 0.1em; }

        /* Estilos de bordes curvos suaves */
        .header-curve { border-radius: 0 0 3.5rem 3.5rem; }
        .product-card { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:active { transform: scale(0.97); }

        /* Animación personalizada de Loader */
        @keyframes pulse-ring {
            0% { transform: scale(.33); opacity: 1; }
            80%, 100% { opacity: 0; }
        }
    </style>
</head>
<body class="max-w-md mx-auto bg-slate-50 min-h-screen relative overflow-x-hidden">

    <!-- Pantalla de Carga -->
    <div id="loader-global" class="fixed inset-0 bg-white z-[1000] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="relative flex items-center justify-center w-24 h-24">
            <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-t-orange-500 rounded-full animate-spin"></div>
            <img src="https://digitaliza-urpin.web.app/logo-mini.png" class="w-10 opacity-20" onerror="this.style.display='none'">
        </div>
        <p class="text-[10px] font-black uppercase mt-8 text-slate-300 tracking-[0.5em] animate-pulse">Sincronizando</p>
    </div>

    <!-- Cabecera Dinámica -->
    <header id="main-header" class="p-8 pt-12 header-curve text-white shadow-2xl transition-all duration-700 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-64 h-64 bg-white/5 rounded-full -mr-32 -mt-32 blur-3xl"></div>
        
        <div class="flex justify-between items-start relative z-10">
            <div class="animate__animated animate__fadeInLeft">
                <h1 id="shop-name" class="text-3xl font-black italic tracking-tighter uppercase leading-none">
                    Digitaliza <span class="text-orange-500">Urpín</span>
                </h1>
                <p id="bcv-rate" class="text-[9px] font-bold text-slate-400 tracking-[0.2em] mt-3 uppercase opacity-80">
                    Sincronizando tasa BCV...
                </p>
            </div>
            <button onclick="toggleCart()" class="relative group active:scale-90 transition-transform">
                <div class="w-14 h-14 bg-white/10 backdrop-blur-md rounded-[1.5rem] flex items-center justify-center border border-white/20 shadow-xl overflow-hidden">
                    <i id="cart-icon" class="fas fa-shopping-cart text-xl transition-all group-hover:rotate-12"></i>
                </div>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-6 h-6 rounded-full flex items-center justify-center font-black hidden border-2 border-slate-900 shadow-lg">0</span>
            </button>
        </div>

        <!-- Buscador -->
        <div class="mt-10 relative animate__animated animate__fadeInUp animate__delay-1s">
            <div class="absolute left-4 top-1/2 -translate-y-1/2 text-white/30">
                <i class="fas fa-search text-sm"></i>
            </div>
            <input type="text" 
                onkeyup="buscar(this.value)" 
                placeholder="¿Qué estás buscando hoy?" 
                class="w-full bg-white/10 backdrop-blur-md border border-white/10 rounded-[1.5rem] py-5 pl-12 pr-6 text-xs text-white font-medium outline-none focus:bg-white/20 focus:border-white/30 transition-all placeholder:text-white/20">
        </div>
    </header>

    <!-- Filtros de Categoría -->
    <section class="mt-4">
        <div id="category-filters" class="flex space-x-4 overflow-x-auto no-scrollbar px-8 py-4 scroll-smooth">
            <!-- Cargado por JS -->
        </div>
    </section>

    <!-- Listado de Productos -->
    <main id="product-list" class="px-8 pb-32 mt-2">
        <!-- Cargado por JS -->
    </main>

    <!-- Modal del Carrito (Deslizable) -->
    <div id="cart-view" class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm translate-y-full transition-transform duration-500 flex items-end">
        <div class="w-full max-w-md mx-auto bg-white rounded-t-[3.5rem] p-10 shadow-2xl relative">
            <!-- Indicador de arrastre -->
            <div class="absolute top-4 left-1/2 -translate-x-1/2 w-12 h-1.5 bg-slate-100 rounded-full"></div>
            
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 id="modal-title" class="font-black text-2xl uppercase italic tracking-tighter text-slate-800">Tu Pedido</h2>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1">Revisa los artículos seleccionados</p>
                </div>
                <button onclick="toggleCart()" class="w-10 h-10 flex items-center justify-center bg-slate-50 text-slate-400 rounded-full hover:bg-slate-100 transition-colors">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>

            <!-- Contenedor de Items -->
            <div id="cart-items" class="max-h-[45vh] overflow-y-auto no-scrollbar mb-8 pr-2">
                <!-- Cargado por JS -->
            </div>

            <!-- Totales -->
            <div class="bg-slate-50 rounded-[2.5rem] p-6 mb-8 border border-slate-100">
                <div class="flex justify-between items-center mb-2">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total Estimado</p>
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tasa: <span class="text-slate-600">BCV</span></p>
                </div>
                <div class="flex justify-between items-end">
                    <h3 class="text-5xl font-black text-slate-900 tracking-tighter leading-none">$<span id="total-usd">0.00</span></h3>
                    <div class="text-right">
                        <p class="text-xl font-black text-orange-500 italic leading-none"><span id="total-bs">0,00</span> <span class="text-xs uppercase ml-1">Bs.</span></p>
                    </div>
                </div>
            </div>

            <!-- Botón de WhatsApp -->
            <button onclick="enviarWhatsApp()" 
                class="group w-full bg-green-500 hover:bg-green-600 text-white py-6 rounded-[2rem] font-black uppercase text-[11px] tracking-[0.2em] flex items-center justify-center gap-4 shadow-xl shadow-green-500/20 active:scale-95 transition-all">
                <i class="fab fa-whatsapp text-2xl animate-pulse"></i>
                <span id="btn-send-text">Enviar Pedido WhatsApp</span>
            </button>
        </div>
    </div>

    <!-- Toast de Notificación -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[101] bg-slate-900 text-white px-6 py-4 rounded-[1.5rem] text-[10px] font-black uppercase tracking-widest shadow-2xl hidden animate__animated animate__faster">
        Producto Añadido
    </div>

    <!-- Footer -->
    <footer class="text-center p-10 pb-16">
        <div class="flex justify-center space-x-2 mb-4 opacity-10">
            <div class="w-1 h-1 bg-slate-900 rounded-full"></div>
            <div class="w-1 h-1 bg-slate-900 rounded-full"></div>
            <div class="w-1 h-1 bg-slate-900 rounded-full"></div>
        </div>
        <p class="text-slate-300 text-[10px] font-black uppercase tracking-[0.5em]">
            Desarrollado por Digitaliza Urpín &copy; 2026
        </p>
    </footer>

</body>
</html>
