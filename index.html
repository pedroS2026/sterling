<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitaliza Urpín | Sistema Universal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAstAXcgNXevSuTbgZYQ_U9_SwhUI4tzTY",
            authDomain: "digitaliza-urpin.firebaseapp.com",
            projectId: "digitaliza-urpin",
            storageBucket: "digitaliza-urpin.firebasestorage.app",
            messagingSenderId: "634374370608",
            appId: "1:634374370608:web:91861bb040c110d560c4f5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const params = new URLSearchParams(window.location.search);
        const CLIENTE_ID = params.get('id') || "burger-test"; 
        
        let TASA_BCV = 49.00; 
        let carrito = [];
        let productosData = [];
        let categoriaActual = "Todas";
        let busquedaActual = "";
        let configNegocio = {};

        // Diccionario de Estilos por Tipo de Negocio
        const temas = {
            food: { primary: 'orange-500', bg: 'slate-900', label: 'Pedido', icon: 'fa-utensils' },
            parts: { primary: 'blue-500', bg: 'slate-900', label: 'Cotización', icon: 'fa-cog' },
            bakery: { primary: 'amber-600', bg: 'stone-800', label: 'Encargo', icon: 'fa-bread-slice' },
            store: { primary: 'emerald-600', bg: 'zinc-900', label: 'Compra', icon: 'fa-shopping-bag' }
        };

        async function actualizarTasa() {
            try {
                const response = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await response.json();
                if (data?.rates?.VES) {
                    TASA_BCV = data.rates.VES;
                    document.getElementById('bcv-rate').innerText = `Tasa BCV: ${TASA_BCV.toFixed(2)} Bs.`;
                }
            } catch (e) { console.error("Error tasa"); }
        }

        onSnapshot(doc(db, "clientes", CLIENTE_ID), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                productosData = data.products || [];
                configNegocio = data.business || {};
                renderInterface();
            }
        });

        function renderInterface() {
            const tipo = configNegocio.type || 'food';
            const tema = temas[tipo] || temas.food;
            
            // Aplicar colores dinámicos
            document.body.className = `max-w-md mx-auto bg-slate-50`;
            const header = document.getElementById('main-header');
            header.className = `p-6 rounded-b-[2.5rem] shadow-2xl text-white relative transition-colors duration-500 bg-${tema.bg}`;
            
            document.getElementById('shop-name').innerHTML = `${configNegocio.name} <span class="text-${tema.primary}">${configNegocio.accent}</span>`;
            document.getElementById('btn-cart-float').className = `relative w-12 h-12 bg-opacity-20 bg-white rounded-2xl flex items-center justify-center border border-white border-opacity-10`;
            document.getElementById('cart-icon').className = `fas ${tema.icon} text-${tema.primary}`;
            
            // Textos dinámicos en modales
            document.getElementById('modal-title').innerText = `Tu ${tema.label}`;
            document.getElementById('btn-send-text').innerText = `Enviar ${tema.label}`;

            renderCategorias(tema);
            renderProductos(tema);
            actualizarTasa();
        }

        function renderCategorias(tema) {
            const cats = ["Todas", ...new Set(productosData.map(p => p.category))];
            const container = document.getElementById('category-filters');
            container.innerHTML = cats.map(cat => `
                <button onclick="filtrar('${cat}')" class="px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider transition-all ${categoriaActual === cat ? `bg-${tema.primary} text-white` : 'bg-white text-slate-400 border border-slate-100'}">
                    ${cat}
                </button>
            `).join('');
        }

        window.filtrar = (cat) => { categoriaActual = cat; renderInterface(); };
        window.buscar = (t) => { busquedaActual = t.toLowerCase(); renderInterface(); };

        function renderProductos(tema) {
            const container = document.getElementById('product-list');
            container.innerHTML = "";
            
            const filtrados = productosData.filter(p => {
                const matchCat = categoriaActual === "Todas" || p.category === categoriaActual;
                const matchSearch = p.name.toLowerCase().includes(busquedaActual);
                return matchCat && matchSearch;
            });

            filtrados.forEach(p => {
                const priceBs = (p.price * TASA_BCV).toLocaleString('es-VE', { minimumFractionDigits: 2 });
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-[1.5rem] shadow-sm border border-slate-50 flex items-center mb-3">
                        <div class="w-20 h-20 bg-slate-100 rounded-2xl overflow-hidden flex-shrink-0">
                            <img src="${p.img}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/200x200?text=Producto'">
                        </div>
                        <div class="ml-4 flex-1">
                            <h3 class="text-xs font-black text-slate-800 uppercase">${p.name}</h3>
                            <div class="flex justify-between items-end mt-2">
                                <div>
                                    <span class="text-sm font-black text-slate-900">$${p.price.toFixed(2)}</span>
                                    <span class="block text-[8px] font-bold text-${tema.primary}">${priceBs} Bs.</span>
                                </div>
                                <button onclick="add(${p.id})" class="bg-${tema.bg} text-white w-8 h-8 rounded-xl flex items-center justify-center">
                                    <i class="fas fa-plus text-[10px]"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.add = (id) => {
            const p = productosData.find(x => x.id === id);
            const item = carrito.find(x => x.id === id);
            if (item) item.qty++; else carrito.push({...p, qty: 1});
            updateCart();
        };

        window.updateCart = () => {
            const count = carrito.reduce((a, b) => a + b.qty, 0);
            const badge = document.getElementById('cart-count');
            badge.innerText = count;
            badge.classList.toggle('hidden', count === 0);
            renderCartItems();
        };

        function renderCartItems() {
            const cont = document.getElementById('cart-items');
            let total = 0;
            cont.innerHTML = carrito.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="flex justify-between items-center py-3 border-b border-slate-50">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-bold text-slate-700 uppercase">${item.name}</span>
                            <span class="text-[9px] text-slate-400">Cant: ${item.qty}</span>
                        </div>
                        <span class="text-[10px] font-black text-slate-900">$${(item.price * item.qty).toFixed(2)}</span>
                    </div>
                `;
            }).join('');
            document.getElementById('total-usd').innerText = total.toFixed(2);
            document.getElementById('total-bs').innerText = (total * TASA_BCV).toLocaleString('es-VE', { minimumFractionDigits: 2 });
        }

        window.toggleCart = () => document.getElementById('cart-view').classList.toggle('translate-y-full');

        window.enviarWhatsApp = () => {
            if (carrito.length === 0) return;
            const extra = document.getElementById('extra-info').value;
            const tipo = configNegocio.type || 'food';
            const label = temas[tipo]?.label || 'Pedido';
            
            let msg = `*NUEVA ${label.toUpperCase()}*\n`;
            msg += `--------------------------\n`;
            carrito.forEach(i => msg += `• ${i.qty}x ${i.name} ($${(i.price * i.qty).toFixed(2)})\n`);
            msg += `--------------------------\n`;
            msg += `*TOTAL:* $${document.getElementById('total-usd').innerText}\n`;
            msg += `*BS:* ${document.getElementById('total-bs').innerText} Bs.\n`;
            if(extra) msg += `\n*CLIENTE:* ${extra}`;
            
            window.open(`https://wa.me/${configNegocio.whatsapp || '584266662491'}?text=${encodeURIComponent(msg)}`, '_blank');
        };

    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <!-- Header Inteligente -->
    <header id="main-header" class="bg-slate-900 p-6 rounded-b-[2.5rem] text-white relative">
        <div class="flex justify-between items-start mb-6">
            <div>
                <h1 id="shop-name" class="text-xl font-black italic tracking-tighter uppercase leading-none italic font-black uppercase">Cargando...</h1>
                <p id="bcv-rate" class="text-[9px] font-bold text-slate-400 tracking-widest mt-2 uppercase">BCV: --</p>
            </div>
            <button onclick="toggleCart()" id="btn-cart-float">
                <i id="cart-icon" class="fas fa-shopping-basket"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] w-6 h-6 rounded-full flex items-center justify-center font-black hidden border-2 border-slate-900">0</span>
            </button>
        </div>
        
        <div class="relative">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
            <input type="text" onkeyup="buscar(this.value)" placeholder="Buscar en el catálogo..." class="w-full bg-black bg-opacity-20 border-none rounded-2xl py-4 pl-12 pr-4 text-xs text-white focus:ring-2 focus:ring-white">
        </div>
    </header>

    <!-- Filtros -->
    <div id="category-filters" class="flex space-x-2 overflow-x-auto no-scrollbar p-4 mt-2"></div>

    <!-- Lista de Productos -->
    <main id="product-list" class="px-4 pb-24"></main>

    <!-- Modal Carrito Universal -->
    <div id="cart-view" class="fixed inset-0 z-50 bg-white translate-y-full transition-transform duration-500 flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-slate-50">
            <button onclick="toggleCart()" class="text-slate-400 font-bold text-xs uppercase"><i class="fas fa-times mr-2"></i> Cerrar</button>
            <h2 id="modal-title" class="font-black text-slate-800 uppercase italic">Tu Carrito</h2>
            <div class="w-10"></div>
        </div>
        <div id="cart-items" class="flex-1 p-6 overflow-y-auto"></div>
        <div class="p-8 border-t bg-white">
            <input id="extra-info" type="text" placeholder="Tu nombre / Mesa / Datos adicionales" class="w-full bg-slate-100 p-4 rounded-2xl text-xs mb-4 border-none focus:ring-2 focus:ring-slate-900">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">Total Neto</p>
                    <p class="text-3xl font-black text-slate-900">$<span id="total-usd">0.00</span></p>
                </div>
                <p class="text-lg font-black text-slate-400 tracking-tighter"><span id="total-bs">0,00</span> Bs.</p>
            </div>
            <button onclick="enviarWhatsApp()" class="w-full bg-green-500 text-white py-5 rounded-2xl font-black uppercase tracking-widest flex items-center justify-center space-x-3 shadow-xl shadow-green-100 active:scale-95 transition-transform">
                <i class="fab fa-whatsapp text-xl"></i>
                <span id="btn-send-text">Confirmar</span>
            </button>
        </div>
    </div>

    <div class="text-center p-8 text-slate-300 text-[8px] font-black uppercase tracking-[0.3em]">
        Digitaliza Urpín • Barcelona
    </div>

</body>
</html>
